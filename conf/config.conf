# External Routing - Configuration
# =================================
# Edit this file to configure domain-based routing.

# --- Network interfaces ---
# Corporate network interface (default gateway)
CORPORATE_IFACE="eth0"

# External WiFi interface (selective routing)
EXTERNAL_IFACE="wlan0"

# --- Routing table ---
# Routing table number for external routing
ROUTING_TABLE=100

# --- Domains ---
# Space-separated list of domains to route through external WiFi.
# Automatically resolved to IPs. Subdomains are also resolved.
DOMAINS="tailscale.com tailscale.io anydesk.net facebook.com fbcdn.net"

# --- DNS ---
# DNS servers to resolve via the external interface.
# If empty, uses the ones assigned by external WiFi DHCP.
EXTERNAL_DNS=""

# --- Refresh ---
# IP refresh interval in minutes (for systemd timer)
REFRESH_INTERVAL=15

# --- Logging ---
# Log file (empty = no logging)
LOG_FILE="/var/log/llx-external-routing.log"

# Verbosity level: 0=minimal, 1=normal, 2=verbose
VERBOSE=1
